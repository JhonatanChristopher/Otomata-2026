<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Token Analyzer</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .container {
        width: 70%;
        margin: auto;
        margin-top: 30px;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 15px;
        font-size: 15px;
        border-radius: 10px;
        border: none;
        outline: none;
        resize: none;
        background: #020617;
        color: #e2e8f0;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    textarea::placeholder {
        color: #64748b;
    }

    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .result {
        margin-top: 25px;
        padding: 20px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: left;
    }

    .result p {
        margin: 8px 0;
        font-size: 15px;
    }

    .label {
        color: #38bdf8;
    }

    .chip {
        display: inline-block;
        background: #1e293b;
        padding: 5px 10px;
        margin: 3px;
        border-radius: 6px;
        font-size: 13px;
    }

</style>
</head>

<body>

<h1>Praktikum 1 : Token Analyzer</h1>

<div class="container">
    <textarea id="code" placeholder="Masukkan kode di sini..."></textarea>
    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>
</div>

<script>
const RESERVED_WORDS = [
    "if", "else", "while", "for", "return",
    "int", "float", "double", "char", "void"
];

function addUnique(arr, item) {
    if (!arr.includes(item)) {
        arr.push(item);
    }
}

function renderChips(data) {
    return data.map(item => `<span class="chip">${item}</span>`).join("");
}

function analyze() {
    const code = document.getElementById("code").value;

    let variables = [];
    let reserved = [];
    let operators = [];
    let symbols = [];
    let numbers = [];
    let unknown = [];

    const tokens = code.match(/\d+(\.\d+)?|[a-zA-Z_][a-zA-Z0-9_]*|[\+\-\*\/=<>!]+|[()\{\}\[\];,]|./g) || [];

    tokens.forEach(token => {
        if (/^\s+$/.test(token)) return;

        if (/^\d/.test(token)) {
            addUnique(numbers, token);
        }
        else if (RESERVED_WORDS.includes(token)) {
            addUnique(reserved, token);
        }
        else if (/^[a-zA-Z_]/.test(token)) {
            addUnique(variables, token);
        }
        else if (/^[\+\-\*\/=<>!]+$/.test(token)) {
            addUnique(operators, token);
        }
        else if (/^[()\{\}\[\];,]$/.test(token)) {
            addUnique(symbols, token);
        }
        else {
            addUnique(unknown, token);
        }
    });

    let output = "";

    function render(label, data) {
        if (data.length > 0) {
            output += `
                <p><span class="label">${label}:</span><br>
                ${renderChips(data)}</p>
            `;
        }
    }

    render("Reserved Words", reserved);
    render("Variabel", variables);
    render("Operator", operators);
    render("Simbol", symbols);
    render("Angka", numbers);
    render("Unknown", unknown);

    document.getElementById("result").innerHTML =
        `<div class="result">${output}</div>`;
}
</script>

</body>
</html>
